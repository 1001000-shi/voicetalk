<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkRoom — 다자간 회의</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c10;
  --s1:#111318;
  --s2:#181c24;
  --s3:#1f2330;
  --border:#252b3b;
  --accent:#5b8af5;
  --accent-glow:rgba(91,138,245,0.18);
  --green:#21d07a;
  --red:#ff4560;
  --amber:#f5a623;
  --purple:#9b6dff;
  --text:#dde1ed;
  --muted:#5a6278;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ─── HEADER ─── */
header{
  display:flex;align-items:center;gap:14px;
  padding:0 28px;height:54px;
  background:var(--s1);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{
  width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.logo-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-name em{color:var(--accent);font-style:normal}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.status-pill{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;
  background:var(--s2);border:1px solid var(--border);
  font-size:11px;color:var(--muted);font-family:var(--mono);
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s,box-shadow .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 7px var(--green)}
.status-dot.err{background:var(--red);box-shadow:0 0 7px var(--red)}

/* ─── MAIN ─── */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 20px;gap:24px;max-width:1200px;width:100%;margin:0 auto}

/* ─── CARDS ─── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px}

/* ─── FIREBASE SETUP ─── */
#fbSetup{width:100%;max-width:520px}
#fbSetup h2{font-size:17px;font-weight:600;margin-bottom:6px}
#fbSetup .sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.info-box{
  background:rgba(91,138,245,.07);border:1px solid rgba(91,138,245,.18);
  border-radius:8px;padding:13px 15px;font-size:12px;color:#99b4f7;
  line-height:1.7;margin-bottom:16px;
}
.info-box a{color:var(--accent)}
.lbl{font-size:10px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
textarea.cfg{
  width:100%;min-height:110px;resize:vertical;
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;color:var(--text);font-family:var(--mono);font-size:12px;
  outline:none;transition:border .2s;
}
textarea.cfg:focus{border-color:var(--accent)}

/* ─── LOBBY ─── */
#lobby{width:100%;max-width:460px;display:none;flex-direction:column;gap:20px}
.lobby-hero{text-align:center;padding:8px 0 4px}
.lobby-hero h1{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.2;
  background:linear-gradient(130deg,#dde1ed 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lobby-hero p{color:var(--muted);font-size:13px;margin-top:8px}
.field{display:flex;flex-direction:column;gap:6px}
input.txt{
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;
  transition:border .2s;
}
input.txt:focus{border-color:var(--accent)}
input.txt::placeholder{color:var(--muted)}
.row{display:flex;gap:8px}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:10px;letter-spacing:1px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:8px;border:none;font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap;outline:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#7099ff;transform:translateY(-1px)}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(255,69,96,.1);color:var(--red);border:1px solid rgba(255,69,96,.2)}
.btn-red:hover{background:rgba(255,69,96,.2)}
.btn-green{background:rgba(33,208,122,.1);color:var(--green);border:1px solid rgba(33,208,122,.2)}
.btn-green:hover{background:rgba(33,208,122,.2)}
.btn-amber{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.btn-amber:hover{background:rgba(245,166,35,.2)}
.btn-purple{background:rgba(155,109,255,.1);color:var(--purple);border:1px solid rgba(155,109,255,.2)}
.btn-purple:hover{background:rgba(155,109,255,.2)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-full{width:100%}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}

/* ─── ROOM ─── */
#room{width:100%;display:none;flex-direction:column;gap:16px}

/* room header bar */
.room-bar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:12px 18px;
}
.room-code{font-family:var(--mono);font-size:13px;color:var(--accent);
  background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;letter-spacing:.5px}
.room-meta{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.peer-badge{
  display:flex;align-items:center;gap:5px;
  background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;
}

/* ─── SCREEN SHARE AREA ─── */
#screenArea{
  background:var(--s1);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;position:relative;display:none;
}
#screenArea video{width:100%;max-height:52vh;object-fit:contain;background:#000;display:block}
.screen-label{
  position:absolute;top:10px;left:12px;
  font-size:11px;font-family:var(--mono);color:var(--text);
  background:rgba(0,0,0,.55);backdrop-filter:blur(8px);
  padding:3px 9px;border-radius:5px;display:flex;align-items:center;gap:6px;
}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--red);
  animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─── PARTICIPANTS GRID ─── */
.participants-title{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);padding:0 2px}
.participants-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}
.peer-card{
  background:var(--s2);border:1px solid var(--border);border-radius:11px;
  padding:14px 12px 12px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  position:relative;transition:border .2s;
}
.peer-card.speaking{border-color:var(--green);box-shadow:0 0 0 2px rgba(33,208,122,.15)}
.peer-card.me-card{border-color:rgba(91,138,245,.35)}
.peer-avatar{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.peer-avatar.av-green{background:linear-gradient(135deg,#21d07a,#0fb35f)}
.peer-avatar.av-amber{background:linear-gradient(135deg,#f5a623,#d48a0a)}
.peer-avatar.av-purple{background:linear-gradient(135deg,#9b6dff,#7040e0)}
.peer-avatar.av-red{background:linear-gradient(135deg,#ff4560,#d42040)}
.peer-avatar.av-teal{background:linear-gradient(135deg,#00cec9,#0099a8)}
.peer-name{font-size:12px;font-weight:500;color:var(--text);text-align:center;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.peer-tags{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-family:var(--mono);font-weight:500}
.tag-muted{background:rgba(255,69,96,.12);color:var(--red);border:1px solid rgba(255,69,96,.2)}
.tag-speaking{background:rgba(33,208,122,.12);color:var(--green);border:1px solid rgba(33,208,122,.2)}
.tag-sharing{background:rgba(155,109,255,.12);color:var(--purple);border:1px solid rgba(155,109,255,.2)}
.peer-mute-btn{
  display:none; /* only shows on "me" card */
}
.me-card .peer-mute-btn{display:flex}

/* ─── CONTROLS BAR ─── */
.ctrl-bar{
  background:var(--s1);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.ctrl-group{display:flex;gap:7px;flex-wrap:wrap}
.ctrl-sep{flex:1}

/* ─── LOG ─── */
.log-wrap{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;max-height:100px;overflow-y:auto}
.log-wrap p{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:2px;line-height:1.5}
.log-wrap p .ts{color:var(--purple)}
.log-wrap p.ok .m{color:var(--green)}
.log-wrap p.err .m{color:var(--red)}
.log-wrap p.warn .m{color:var(--amber)}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

@media(max-width:600px){
  main{padding:16px 12px}
  .participants-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .ctrl-bar{justify-content:center}.ctrl-sep{display:none}
}
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">🔗</div>
    <div class="logo-name">Link<em>Room</em></div>
  </a>
  <div class="hdr-right">
    <div class="status-pill">
      <div class="status-dot" id="sDot"></div>
      <span id="sLabel">대기 중</span>
    </div>
  </div>
</header>

<main>

<!-- 로비 -->
<div id="lobby">
  <div class="lobby-hero">
    <h1>최대 10명<br>실시간 회의</h1>
    <p>방 코드 하나로 연결 · 설치 없음 · 무료</p>
  </div>
  <div class="card" style="display:flex;flex-direction:column;gap:16px">
    <div class="field">
      <div class="lbl">내 이름</div>
      <input class="txt" id="myName" type="text" placeholder="표시될 이름" maxlength="18">
    </div>
    <button class="btn btn-primary btn-full" onclick="createRoom()">+ 새 방 만들기</button>
    <div class="divider">또는</div>
    <div class="field">
      <div class="lbl">방 코드로 참여</div>
      <div class="row">
        <input class="txt" id="joinCode" type="text" placeholder="ROOM-XXXX" maxlength="12" style="flex:1;text-transform:uppercase">
        <button class="btn btn-ghost" onclick="joinRoom()">입장 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ③ 통화방 -->
<div id="room">
  <!-- 방 헤더 -->
  <div class="room-bar">
    <span style="font-size:11px;color:var(--muted)">방 코드</span>
    <div class="room-code" id="rCode"></div>
    <button class="btn btn-ghost btn-sm" onclick="copyCode()">복사</button>
    <div class="room-meta">
      <div class="peer-badge">
        <div class="status-dot on"></div>
        <span id="pCount">1명 참여 중</span>
      </div>
    </div>
  </div>

  <!-- 화면 공유 영역 -->
  <div id="screenArea">
    <video id="screenVideo" autoplay playsinline></video>
    <div class="screen-label"><div class="rec-dot"></div><span id="screenOwnerLabel">화면 공유 중</span></div>
    <button class="btn btn-red btn-sm" id="stopScreenBtn" style="position:absolute;top:10px;right:12px;display:none" onclick="stopMyScreen()">■ 중지</button>
  </div>

  <!-- 참가자 그리드 -->
  <div class="participants-title">참가자</div>
  <div class="participants-grid" id="pGrid"></div>

  <!-- 컨트롤 바 -->
  <div class="ctrl-bar">
    <div class="ctrl-group">
      <button class="btn btn-ghost" id="btnMic" onclick="toggleMyMic()">🎙️ 마이크 켜기</button>
      <button class="btn btn-ghost" id="btnScreen" onclick="toggleMyScreen()">🖥️ 화면 공유</button>
      <button class="btn btn-ghost" id="btnCamera" onclick="toggleMyCamera()">📷 카메라 켜기</button>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-group">
      <button class="btn btn-red" onclick="leaveRoom()">📴 나가기</button>
    </div>
  </div>

  <!-- 로그 -->
  <div class="log-wrap" id="logWrap"></div>
</div>

</main>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════════════
const ICE = { iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] };
const COLORS = ['','av-green','av-amber','av-purple','av-red','av-teal'];
const MAX_PEERS = 10;

let db = null;
let roomId = null;
let myId   = 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
let myName = '나';
let myColorIdx = Math.floor(Math.random()*5)+1;

// streams
let micStream    = null;   // audio
let cameraStream = null;   // video (camera)
let screenStream = null;   // video (screen)
let micEnabled   = false;
let cameraOn     = false;
let screenOn     = false;

// mesh peers: peerId → { pc, dc, name, colorIdx, muted, sharing }
let peers = {};

// Firebase refs
let roomRef    = null;
let membersRef = null;

// ═══════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  const cfg = {
    apiKey: "AIzaSyAzgxhtWtq0EBlGQa1GdXyQ37dYzzoySIQ",
    authDomain: "voicetalk-be76e.firebaseapp.com",
    databaseURL: "https://voicetalk-be76e-default-rtdb.firebaseio.com",
    projectId: "voicetalk-be76e",
    storageBucket: "voicetalk-be76e.firebasestorage.app",
    messagingSenderId: "131004300500",
    appId: "1:131004300500:web:37629440a9769a304e4f41"
  };
  try {
    if(firebase.apps.length) firebase.apps.forEach(a=>a.delete());
    firebase.initializeApp(cfg);
    db = firebase.database();
    show('lobby', true);
    setStatus('연결됨','on');
    log('Firebase 연결 완료','ok');
  } catch(e) {
    alert('Firebase 초기화 실패:\n'+e.message);
  }
});

// ═══════════════════════════════════════════════════════
//  ROOM LIFECYCLE
// ═══════════════════════════════════════════════════════
function genCode(){ return 'ROOM-'+Math.random().toString(36).slice(2,6).toUpperCase(); }

function createRoom(){
  myName = document.getElementById('myName').value.trim()||'나';
  enterRoom(genCode());
}
function joinRoom(){
  myName = document.getElementById('myName').value.trim()||'나';
  const c = document.getElementById('joinCode').value.trim().toUpperCase();
  if(!c){ alert('방 코드를 입력하세요'); return; }
  enterRoom(c);
}

async function enterRoom(code){
  roomId = code;
  show('lobby',false); show('room',true);
  document.getElementById('rCode').textContent = roomId;
  document.getElementById('room').style.display = 'flex';

  roomRef    = db.ref('rooms/'+roomId);
  membersRef = roomRef.child('members');

  // 마이크 자동 시작
  await startMic();

  // 내 정보 등록
  await membersRef.child(myId).set({ name:myName, color:myColorIdx, muted:!micEnabled, sharing:false, ts:Date.now() });
  membersRef.child(myId).onDisconnect().remove();

  // 기존 멤버 목록 받아서 연결
  const snap = await membersRef.once('value');
  const existing = [];
  snap.forEach(c=>{ if(c.key!==myId) existing.push(c.key); });

  // 멤버 추가/제거 감지
  membersRef.on('child_added', snap=>{
    const pid = snap.key;
    if(pid===myId) { renderMe(); return; }
    if(peers[pid]) return;
    initPeer(pid, snap.val(), true/*imCaller*/);
    log(`${snap.val().name || pid} 님이 참여했습니다`,'ok');
  });
  membersRef.on('child_removed', snap=>{
    const pid = snap.key;
    if(peers[pid]){ destroyPeer(pid); }
    log(`${snap.val().name||pid} 님이 퇴장했습니다`,'warn');
    updatePeerCount();
  });
  membersRef.on('child_changed', snap=>{
    if(snap.key===myId) return;
    if(peers[snap.key]) updatePeerCard(snap.key, snap.val());
  });

  // 시그널 수신
  roomRef.child('signals/'+myId).on('child_added', async snap=>{
    const data = snap.val();
    if(!data) return;
    snap.ref.remove();
    const from = data.from;
    if(!peers[from] && data.type==='offer'){
      const mSnap = await membersRef.child(from).get();
      initPeer(from, mSnap.val()||{name:from,color:1}, false/*imCallee*/);
    }
    if(!peers[from]) return;
    const pc = peers[from].pc;
    if(data.type==='offer'){
      await pc.setRemoteDescription({type:'offer',sdp:data.sdp});
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal(from,{type:'answer',sdp:answer.sdp});
      drainIce(from);
    } else if(data.type==='answer'){
      await pc.setRemoteDescription({type:'answer',sdp:data.sdp});
      drainIce(from);
    } else if(data.type==='ice'){
      if(pc.remoteDescription) await pc.addIceCandidate(data.candidate).catch(()=>{});
      else { peers[from]._iceQ = peers[from]._iceQ||[]; peers[from]._iceQ.push(data.candidate); }
    }
  });

  renderMe();
  updatePeerCount();
  log('방에 입장했습니다 · 코드: '+roomId,'ok');
}

function sendSignal(to, data){
  roomRef.child('signals/'+to).push({...data, from:myId});
}

// ═══════════════════════════════════════════════════════
//  PEER CONNECTION
// ═══════════════════════════════════════════════════════
function initPeer(peerId, info, iAmCaller){
  const pc = new RTCPeerConnection(ICE);
  peers[peerId] = { pc, name:info.name||peerId, colorIdx:info.color||1, muted:!!info.muted, sharing:!!info.sharing, _iceQ:[] };

  // 내 트랙 추가
  addMyTracksToPeer(peerId);

  pc.onicecandidate = e=>{
    if(e.candidate) sendSignal(peerId,{type:'ice',candidate:e.candidate.toJSON()});
  };

  pc.ontrack = e=>{
    const track = e.track;
    if(track.kind==='audio'){
      const audio = new Audio();
      audio.srcObject = new MediaStream([track]);
      audio.play().catch(()=>{});
      peers[peerId]._audioEl = audio;
    } else if(track.kind==='video'){
      // 화면 공유 비디오 처리
      showRemoteScreen(peerId, new MediaStream([track]));
    }
  };

  pc.onconnectionstatechange = ()=>{
    const st = pc.connectionState;
    if(st==='connected'){
      log(`${peers[peerId]?.name} 연결됨`,'ok');
      renderPeerCard(peerId);
    }
    if(st==='failed'||st==='closed') destroyPeer(peerId);
  };

  // offer
  if(iAmCaller){
    pc.onnegotiationneeded = async ()=>{
      try{
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal(peerId,{type:'offer',sdp:offer.sdp});
      }catch(e){}
    };
  }

  renderPeerCard(peerId);
  updatePeerCount();
}

function drainIce(peerId){
  const p = peers[peerId]; if(!p) return;
  (p._iceQ||[]).forEach(c=>p.pc.addIceCandidate(c).catch(()=>{}));
  p._iceQ=[];
}

function addMyTracksToPeer(peerId){
  const p = peers[peerId]; if(!p) return;
  const pc = p.pc;
  // audio
  if(micStream) micStream.getAudioTracks().forEach(t=>{
    if(!pc.getSenders().find(s=>s.track===t)) pc.addTrack(t,micStream);
  });
  // video (camera or screen)
  const vs = screenStream||cameraStream;
  if(vs) vs.getVideoTracks().forEach(t=>{
    if(!pc.getSenders().find(s=>s.track===t)) pc.addTrack(t,vs);
  });
}

async function replaceVideoTrack(track){
  for(const pid in peers){
    const pc = peers[pid].pc;
    const sender = pc.getSenders().find(s=>s.track&&s.track.kind==='video');
    if(sender) await sender.replaceTrack(track).catch(()=>{});
    else if(track){
      const stream = screenStream||cameraStream;
      if(stream) pc.addTrack(track,stream);
    }
  }
}

function destroyPeer(peerId){
  const p = peers[peerId]; if(!p) return;
  p.pc.close();
  if(p._audioEl){ p._audioEl.pause(); p._audioEl=null; }
  delete peers[peerId];
  document.getElementById('pc-'+peerId)?.remove();
  updatePeerCount();
  // 화면 공유 중이던 사람이 나갔으면 숨김
  if(document.getElementById('screenOwnerLabel').textContent.includes(p.name)){
    hideScreen();
  }
}

// ═══════════════════════════════════════════════════════
//  MEDIA CONTROLS
// ═══════════════════════════════════════════════════════
async function startMic(){
  try{
    micStream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true},video:false});
    micEnabled = true;
    document.getElementById('btnMic').className='btn btn-green';
    document.getElementById('btnMic').textContent='🎙️ 마이크 끄기';
    log('마이크 켜짐','ok');
  }catch(e){
    micStream = new MediaStream();
    micEnabled = false;
    log('마이크 오류: '+e.message,'err');
  }
  await broadcastMyState();
}

async function toggleMyMic(){
  if(!micStream||micStream.getTracks().length===0){ await startMic(); return; }
  micEnabled = !micEnabled;
  micStream.getAudioTracks().forEach(t=>t.enabled=micEnabled);
  const btn=document.getElementById('btnMic');
  if(micEnabled){ btn.className='btn btn-green'; btn.textContent='🎙️ 마이크 끄기'; }
  else { btn.className='btn btn-ghost'; btn.textContent='🎙️ 마이크 켜기'; }
  await broadcastMyState();
  renderMe();
  log('마이크 '+(micEnabled?'켜짐':'꺼짐'));
}

async function toggleMyCamera(){
  if(cameraOn){
    cameraStream?.getTracks().forEach(t=>t.stop()); cameraStream=null; cameraOn=false;
    await replaceVideoTrack(null);
    document.getElementById('btnCamera').className='btn btn-ghost';
    document.getElementById('btnCamera').textContent='📷 카메라 켜기';
    log('카메라 끄기');
  } else {
    try{
      cameraStream = await navigator.mediaDevices.getUserMedia({video:true});
      cameraOn=true; screenOn=false;
      if(screenStream){ screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
      await replaceVideoTrack(cameraStream.getVideoTracks()[0]);
      document.getElementById('btnCamera').className='btn btn-green';
      document.getElementById('btnCamera').textContent='📷 카메라 끄기';
      document.getElementById('btnScreen').className='btn btn-ghost';
      document.getElementById('btnScreen').textContent='🖥️ 화면 공유';
      log('카메라 켜짐','ok');
    }catch(e){ log('카메라 오류: '+e.message,'err'); }
  }
}

async function toggleMyScreen(){
  if(screenOn){ stopMyScreen(); return; }
  try{
    screenStream = await navigator.mediaDevices.getDisplayMedia({video:{frameRate:15},audio:true});
    screenOn=true; cameraOn=false;
    if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; }
    await replaceVideoTrack(screenStream.getVideoTracks()[0]);
    document.getElementById('btnScreen').className='btn btn-amber';
    document.getElementById('btnScreen').textContent='🖥️ 공유 중지';
    document.getElementById('btnCamera').className='btn btn-ghost';
    document.getElementById('btnCamera').textContent='📷 카메라 켜기';
    document.getElementById('stopScreenBtn').style.display='flex';

    // 내 화면 공유도 로컬 미리보기
    document.getElementById('screenVideo').srcObject = screenStream;
    document.getElementById('screenOwnerLabel').textContent = myName+' (나)';
    document.getElementById('screenArea').style.display='block';
    document.getElementById('stopScreenBtn').style.display='flex';

    screenStream.getVideoTracks()[0].onended = ()=>stopMyScreen();
    await broadcastMyState(true);
    log('화면 공유 시작','ok');
  }catch(e){ log('화면 공유 오류: '+e.message,'err'); }
}

async function stopMyScreen(){
  if(!screenOn) return;
  screenStream?.getTracks().forEach(t=>t.stop()); screenStream=null; screenOn=false;
  await replaceVideoTrack(null);
  document.getElementById('btnScreen').className='btn btn-ghost';
  document.getElementById('btnScreen').textContent='🖥️ 화면 공유';
  document.getElementById('stopScreenBtn').style.display='none';
  hideScreen();
  await broadcastMyState(false);
  log('화면 공유 중지','warn');
}

function showRemoteScreen(peerId, stream){
  const pname = peers[peerId]?.name || peerId;
  document.getElementById('screenVideo').srcObject = stream;
  document.getElementById('screenOwnerLabel').textContent = pname + '님 화면 공유 중';
  document.getElementById('screenArea').style.display = 'block';
  document.getElementById('stopScreenBtn').style.display = 'none';
}
function hideScreen(){
  document.getElementById('screenArea').style.display='none';
  document.getElementById('screenVideo').srcObject=null;
}

// 내 상태 Firebase에 broadcast
async function broadcastMyState(sharing){
  if(!membersRef) return;
  const s = sharing !== undefined ? sharing : screenOn;
  await membersRef.child(myId).update({ muted:!micEnabled, sharing:s });
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
const avatarColors = ['','av-green','av-amber','av-purple','av-red','av-teal'];

function initial(name){ return (name||'?')[0].toUpperCase(); }

function renderMe(){
  let card = document.getElementById('pc-'+myId);
  if(!card){
    card = document.createElement('div');
    card.id = 'pc-'+myId;
    card.className = 'peer-card me-card';
    document.getElementById('pGrid').prepend(card);
  }
  card.innerHTML = `
    <div class="peer-avatar ${avatarColors[myColorIdx]}">${initial(myName)}</div>
    <div class="peer-name">${esc(myName)} <span style="font-size:10px;color:var(--muted)">(나)</span></div>
    <div class="peer-tags">
      ${!micEnabled?'<span class="tag tag-muted">🔇 음소거</span>':'<span class="tag tag-speaking">🎙️ 말할 수 있음</span>'}
      ${screenOn?'<span class="tag tag-sharing">🖥️ 공유 중</span>':''}
    </div>
    <button class="btn btn-sm peer-mute-btn ${micEnabled?'btn-green':'btn-ghost'}" onclick="toggleMyMic()" style="display:flex;margin-top:2px">
      ${micEnabled?'🎙️ 끄기':'🎙️ 켜기'}
    </button>
  `;
}

function renderPeerCard(peerId){
  const p = peers[peerId]; if(!p) return;
  let card = document.getElementById('pc-'+peerId);
  if(!card){
    card = document.createElement('div');
    card.id = 'pc-'+peerId;
    card.className = 'peer-card';
    document.getElementById('pGrid').appendChild(card);
  }
  card.innerHTML = `
    <div class="peer-avatar ${avatarColors[p.colorIdx]||''}">${initial(p.name)}</div>
    <div class="peer-name">${esc(p.name)}</div>
    <div class="peer-tags">
      ${p.muted?'<span class="tag tag-muted">🔇 음소거</span>':'<span class="tag tag-speaking">🎙️ 대화 중</span>'}
      ${p.sharing?'<span class="tag tag-sharing">🖥️ 공유 중</span>':''}
    </div>
  `;
}

function updatePeerCard(peerId, info){
  if(!peers[peerId]) return;
  peers[peerId].muted  = !!info.muted;
  peers[peerId].sharing= !!info.sharing;
  if(info.name) peers[peerId].name = info.name;
  renderPeerCard(peerId);

  // 화면공유 상태 변경
  if(!info.sharing && document.getElementById('screenOwnerLabel').textContent.includes(peers[peerId].name)){
    hideScreen();
  }
}

function updatePeerCount(){
  const n = 1+Object.keys(peers).length;
  document.getElementById('pCount').textContent = n+'명 참여 중';
}

// ═══════════════════════════════════════════════════════
//  LEAVE
// ═══════════════════════════════════════════════════════
async function leaveRoom(){
  if(screenOn) await stopMyScreen();
  micStream?.getTracks().forEach(t=>t.stop());
  cameraStream?.getTracks().forEach(t=>t.stop());
  Object.keys(peers).forEach(destroyPeer);
  if(membersRef) await membersRef.child(myId).remove().catch(()=>{});
  if(roomRef) roomRef.child('signals/'+myId).off();
  membersRef?.off(); roomRef?.off();
  roomRef=null; membersRef=null; roomId=null;
  micStream=null; cameraStream=null; screenStream=null;
  micEnabled=false; cameraOn=false; screenOn=false;
  document.getElementById('pGrid').innerHTML='';
  show('room',false); show('lobby',true);
  document.getElementById('btnMic').className='btn btn-ghost'; document.getElementById('btnMic').textContent='🎙️ 마이크 켜기';
  document.getElementById('btnCamera').className='btn btn-ghost'; document.getElementById('btnCamera').textContent='📷 카메라 켜기';
  document.getElementById('btnScreen').className='btn btn-ghost'; document.getElementById('btnScreen').textContent='🖥️ 화면 공유';
  log('통화 종료');
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function show(id,v){
  const el=document.getElementById(id);
  if(!el) return;
  if(v){ el.style.display = (id==='lobby')?'flex':'flex'; }
  else el.style.display='none';
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function setStatus(lbl,cls){
  document.getElementById('sDot').className='status-dot '+(cls||'');
  document.getElementById('sLabel').textContent=lbl;
}
function copyCode(){
  navigator.clipboard.writeText(roomId||'').then(()=>log('코드 복사됨: '+roomId,'ok'));
}
function log(msg,type=''){
  const p=document.getElementById('logWrap');
  const el=document.createElement('p');
  el.className=type;
  el.innerHTML=`<span class="ts">[${new Date().toLocaleTimeString('ko-KR')}]</span> <span class="m">${msg}</span>`;
  p.appendChild(el);
  p.scrollTop=p.scrollHeight;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement.id==='joinCode') joinRoom();
});
</script>
